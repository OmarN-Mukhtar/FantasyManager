name: Daily Data Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        lfs: true
    
    - name: Pull Git LFS files
      run: git lfs pull
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 1 - Fetch FPL data and news
      run: |
        python auxilliary/data_fetcher.py

    - name: Step 2 - Run sentiment analysis
      run: |
        python sentiment/sentiment_analyzer.py

    - name: Step 3 - Generate predictions with sentiment
      run: |
        python prediction/predictor.py

    - name: Step 4 - Build RAG vector database
      run: |
        python RAG/langchain_rag.py

    - name: Step 5 - Launch app (smoke check)
      run: |
        timeout 20s streamlit run auxilliary/app.py --server.headless true --server.port 8501 || true
    
    - name: Commit and push updates
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add generated data files and vector database
        git add data/players.json data/news.json data/predictions.json data/sentiment_analysis.json data/players_with_sentiment.csv data/qualified_players.csv 2>/dev/null || true
        git add vector_db/langchain_faiss/* 2>/dev/null || true
        
        # Only commit if there are staged changes
        if git diff --staged --quiet; then
          echo "ℹ️  No changes to commit"
        else
          git commit -m "🤖 Daily update: data, sentiment, predictions, rag, app check"
          git push
          echo "✅ Changes committed and pushed"
        fi
