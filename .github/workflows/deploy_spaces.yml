name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'RAG/**'
      - 'auxilliary/**'
      - 'requirements.txt'
      - 'data/predictions.csv'
      - 'data/sentiment_analysis.csv'
      - 'data/players.csv'
      - 'data/news.json'
      - 'README.md'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true
        
    - name: Deploy
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN || 'not-set' }}
      run: |
        git lfs install

        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

        SPACE_REPO="${{ secrets.HF_SPACE_REPO }}"

        if [ -z "$SPACE_REPO" ]; then
          echo "⚠️ HF_SPACE_REPO not set. Skipping deployment."
          exit 0
        fi

        git clone https://huggingface.co/spaces/$SPACE_REPO hf-space

        # Clean up everything to ensure no stale files
        rm -rf hf-space/*

        cp README.md hf-space/README.md
        cp auxilliary/app.py hf-space/app.py
        cp requirements.txt hf-space/requirements.txt
        cp -r auxilliary hf-space/
        cp -r RAG hf-space/
        # Only the data files the app actually reads (chat tools + Players tab)
        mkdir -p hf-space/data
        cp data/predictions.csv data/sentiment_analysis.csv data/players.csv data/news.json hf-space/data/
        
        cd hf-space

        git config credential.helper store
        echo "https://user:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Auto-deploy from GitHub Actions"
        git push

        echo "✅ Successfully deployed to Hugging Face Spaces!"
